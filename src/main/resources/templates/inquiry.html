<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約照会</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen">

<main class="max-w-2xl mx-auto px-6 py-16">
    <div class="bg-white rounded-3xl border border-amber-100 shadow-sm p-8 md:p-10">
        <div class="text-center">
            <div class="text-5xl mb-4">🔎</div>
            <h1 class="text-3xl font-bold text-slate-900">予約照会</h1>
            <p class="mt-3 text-slate-600 leading-7">
                予約番号・メールアドレス・飼い主さまのお名前を入力すると、
                同じメールアドレスで登録された予約一覧を確認できます。
            </p>
        </div>

        <form th:action="@{/inquiry}" method="post" class="mt-8 space-y-5">
            <div th:if="${inquiryError}" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">
                <p th:text="${inquiryError}"></p>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">予約番号</label>
                <input type="text" name="reservationCode" th:value="${reservationCode}"
                       class="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400"
                       placeholder="例：RES-1743829312345">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">メールアドレス</label>
                <input type="email" name="email" th:value="${email}"
                       class="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400"
                       placeholder="example@mail.com">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">飼い主さまのお名前</label>
                <input type="text" name="ownerName" th:value="${ownerName}"
                       class="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400"
                       placeholder="お名前をご入力ください">
            </div>

            <button type="submit"
                    class="w-full rounded-full bg-slate-900 px-6 py-3 text-white font-semibold hover:bg-slate-800">
                予約を確認する
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-slate-500 hover:text-slate-700">トップページへ戻る</a>
        </div>
    </div>
</main>

</body>
</html>
