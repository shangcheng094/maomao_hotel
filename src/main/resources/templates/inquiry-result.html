<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約照会結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen">

<main class="max-w-7xl mx-auto px-6 py-12">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">予約照会結果</h1>
        <p class="mt-2 text-slate-600">入力情報の確認が取れたため、同じメールアドレスで登録された予約一覧を表示しています。</p>
    </div>

    <div class="bg-white rounded-3xl border border-amber-100 shadow-sm p-6 mb-8">
        <div class="grid md:grid-cols-3 gap-4">
            <div>
                <p class="text-sm text-slate-500">照会に使用した予約番号</p>
                <p class="mt-1 font-semibold" th:text="${searchedReservationCode}">RES-123456789</p>
            </div>
            <div>
                <p class="text-sm text-slate-500">メールアドレス</p>
                <p class="mt-1 font-semibold break-all" th:text="${searchedEmail}">example@mail.com</p>
            </div>
            <div>
                <p class="text-sm text-slate-500">飼い主さま</p>
                <p class="mt-1 font-semibold" th:text="${searchedOwnerName}">山田花子</p>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-amber-100 overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-xl font-bold">予約一覧</h2>
            <span class="text-sm text-slate-500" th:text="'件数：' + ${#lists.size(reservations)} + '件'">件数</span>
        </div>

        <div th:if="${#lists.isEmpty(reservations)}" class="p-10 text-center text-slate-500">
            予約データはありません。
        </div>

        <div th:if="${!#lists.isEmpty(reservations)}" class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-slate-50 text-slate-700">
                <tr>
                    <th class="px-4 py-3 text-left">予約番号</th>
                    <th class="px-4 py-3 text-left">猫ちゃん</th>
                    <th class="px-4 py-3 text-left">チェックイン</th>
                    <th class="px-4 py-3 text-left">チェックアウト</th>
                    <th class="px-4 py-3 text-left">お部屋</th>
                    <th class="px-4 py-3 text-left">備考</th>
                    <th class="px-4 py-3 text-left">登録日時</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservations}" class="border-t border-slate-100 align-top">
                    <td class="px-4 py-3 font-semibold text-amber-700" th:text="${reservation.reservationCode}">RES-123</td>
                    <td class="px-4 py-3" th:text="${reservation.catName}">cat</td>
                    <td class="px-4 py-3" th:text="${reservation.checkInDate}">2026-04-20</td>
                    <td class="px-4 py-3" th:text="${reservation.checkOutDate}">2026-04-25</td>
                    <td class="px-4 py-3" th:text="${reservation.roomType}">room</td>
                    <td class="px-4 py-3 whitespace-pre-wrap break-words max-w-xs" th:text="${reservation.noteText}">note</td>
                    <td class="px-4 py-3" th:text="${reservation.createdAt}">2026-04-05T12:00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-8 flex flex-col sm:flex-row gap-4">
        <a href="/inquiry"
           class="rounded-full bg-slate-900 px-6 py-3 text-white font-semibold text-center hover:bg-slate-800">
            もう一度照会する
        </a>
        <a href="/"
           class="rounded-full bg-amber-500 px-6 py-3 text-white font-semibold text-center hover:bg-amber-600">
            トップへ戻る
        </a>
    </div>
</main>

</body>
</html>
