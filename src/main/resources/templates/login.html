<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-amber-100 p-8">
    <div class="text-center mb-8">
        <div class="text-5xl mb-3">🔐</div>
        <h1 class="text-3xl font-bold text-slate-900">管理者ログイン</h1>
        <p class="text-slate-500 mt-2">予約一覧を見るにはログインしてください。</p>
    </div>

    <form th:action="@{/admin/login}" th:object="${adminLoginForm}" method="post" class="space-y-5">
        <div th:if="${loginError}" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">
            <p th:text="${loginError}"></p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">ユーザー名</label>
            <input th:field="*{username}" type="text"
                   class="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="mt-2 text-sm text-red-600"></p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">パスワード</label>
            <input th:field="*{password}" type="password"
                   class="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-2 text-sm text-red-600"></p>
        </div>

        <button type="submit"
                class="w-full rounded-full bg-amber-500 px-6 py-3 text-white font-semibold hover:bg-amber-600">
            ログイン
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="/" class="text-sm text-slate-500 hover:text-slate-700">トップページへ戻る</a>
    </div>
</div>

</body>
</html>
