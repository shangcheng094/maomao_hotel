<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約完了</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen">

<main class="max-w-3xl mx-auto px-6 py-16">
    <div class="bg-white rounded-3xl border border-amber-100 shadow-sm p-8 md:p-10">
        <div class="text-center">
            <div class="text-5xl mb-4">🐾</div>
            <h1 class="text-3xl font-bold text-slate-900">予約が完了しました</h1>
            <p class="mt-3 text-slate-600">ご予約ありがとうございます。以下の予約番号を保存してください。</p>
        </div>

        <div class="mt-8 rounded-3xl bg-amber-50 border border-amber-200 p-6 text-center">
            <p class="text-sm text-slate-500">予約番号</p>
            <p class="mt-2 text-3xl font-extrabold text-amber-700" th:text="${reservationCode}">RES-123456789</p>
        </div>

        <div class="mt-8 grid md:grid-cols-2 gap-5">
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">飼い主さま</p>
                <p class="mt-1 font-semibold" th:text="${completedOwnerName}">山田花子</p>
            </div>
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">メールアドレス</p>
                <p class="mt-1 font-semibold break-all" th:text="${completedEmail}">example@mail.com</p>
            </div>
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">猫ちゃんのお名前</p>
                <p class="mt-1 font-semibold" th:text="${completedCatName}">ねこ</p>
            </div>
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">お部屋</p>
                <p class="mt-1 font-semibold" th:text="${completedRoomType}">スタンダードルーム</p>
            </div>
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">チェックイン</p>
                <p class="mt-1 font-semibold" th:text="${completedCheckInDate}">2026-04-20</p>
            </div>
            <div class="rounded-2xl border border-slate-200 p-4">
                <p class="text-sm text-slate-500">チェックアウト</p>
                <p class="mt-1 font-semibold" th:text="${completedCheckOutDate}">2026-04-25</p>
            </div>
        </div>

        <div class="mt-8 rounded-2xl bg-slate-50 border border-slate-200 p-5 text-sm text-slate-600 leading-7">
            予約照会ページでは、予約番号・メールアドレス・お名前を入力すると、
            同じメールアドレスで登録された予約一覧を確認できます。
        </div>

        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
            <a th:href="@{/inquiry(reservationCode=${reservationCode}, email=${completedEmail}, ownerName=${completedOwnerName})}"
               class="rounded-full bg-slate-900 px-6 py-3 text-white font-semibold text-center hover:bg-slate-800">
                予約照会ページへ
            </a>
            <a href="/"
               class="rounded-full bg-amber-500 px-6 py-3 text-white font-semibold text-center hover:bg-amber-600">
                トップへ戻る
            </a>
        </div>
    </div>
</main>

</body>
</html>
